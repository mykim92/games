document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

         <div style=\"display:grid;column-gap:16px;grid-template-columns:1.1fr 0.9fr 1.3fr 1.3fr;padding:9px 16px;border-bottom:1px solid #1b212c;font-size:10px;text-transform:uppercase;color:#5c6675;font-weight:600;\">\n                <span>PK<\u002Fspan><span>컬럼<\u002Fspan><span>변경 전 (타겟)<\u002Fspan><span>변경 후 (= 소스)<\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ sel.beforeAfter }}\" as=\"b\" hint-placeholder-count=\"2\">\n                <div style=\"display:grid;column-gap:16px;grid-template-columns:1.1fr 0.9fr 1.3fr 1.3fr;align-items:center;padding:9px 16px;border-bottom:1px solid #161b26;\">\n                  <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#9aa4b2;\">{{ b.pk }}<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#dbe2ea;\">{{ b.field }}<\u002Fspan>\n                  <span><span style=\"font-family:'JetBrains Mono';font-size:12px;color:#f0a3a3;background:rgba(248,113,113,.1);border-radius:4px;padding:2px 7px;text-decoration:line-through;\">{{ b.before }}<\u002Fspan><\u002Fspan>\n                  <span><span style=\"font-family:'JetBrains Mono';font-size:12px;color:#8be0b5;background:rgba(52,211,153,.1);border-radius:4px;padding:2px 7px;\">{{ b.after }}<\u002Fspan><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- decision -->\n          <sc-if value=\"{{ sel.isPending }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;align-items:center;gap:11px;padding:14px 16px;background:#0c1017;border:1px solid #1b212c;border-radius:10px;margin-bottom:18px;\">\n            <span style=\"font-size:12px;color:#8a94a3;\">이 보정을 타겟에 적용할까요? 적용 후 롤백 스냅샷으로 되돌릴 수 있습니다.<\u002Fspan>\n            <div style=\"flex:1;\"><\u002Fdiv>\n            <div onclick=\"{{ reject }}\" style=\"padding:9px 18px;border:1px solid #5a2a2a;border-radius:8px;font-size:12.5px;font-weight:600;color:#f0a3a3;cursor:pointer;background:rgba(248,113,113,.06);\">반려<\u002Fdiv>\n            <div onclick=\"{{ approve }}\" style=\"padding:9px 22px;border-radius:8px;font-size:12.5px;font-weight:600;color:#fff;cursor:pointer;background:#16a34a;box-shadow:0 1px 0 #15803d;\">✓ 승인 · 보정 적용<\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ sel.isDecided }}\">\n          <div style=\"display:flex;align-items:center;gap:11px;padding:14px 16px;border-radius:10px;margin-bottom:18px;background:{{ sel.resultBg }};border:1px solid {{ sel.resultBorder }};\">\n            <span style=\"font-size:14px;color:{{ sel.resultColor }};\">{{ sel.resultIcon }}<\u002Fspan>\n            <span style=\"font-size:12.5px;color:{{ sel.resultColor }};font-weight:600;\">{{ sel.resultText }}<\u002Fspan>\n            <div style=\"flex:1;\"><\u002Fdiv>\n            <div style=\"padding:7px 14px;border:1px solid #232a37;border-radius:7px;font-size:12px;color:#dbe2ea;cursor:pointer;\">↩ 롤백<\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- audit log -->\n          <div style=\"background:#10141c;border:1px solid #1b212c;border-radius:10px;overflow:hidden;\">\n            <div style=\"padding:11px 16px;border-bottom:1px solid #1b212c;font-size:12px;font-weight:600;color:#e8edf4;\">감사 로그 (Audit)<\u002Fdiv>\n            <div style=\"padding:6px 6px;\">\n              <sc-for list=\"{{ audit }}\" as=\"e\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;gap:11px;padding:9px 11px;\">\n                  <span style=\"width:7px;height:7px;border-radius:50%;background:{{ e.color }};margin-top:5px;flex:0 0 auto;\"><\u002Fspan>\n                  <div style=\"flex:1;\">\n                    <div style=\"font-size:12px;color:#cfd6df;\">{{ e.text }}<\u002Fdiv>\n                    <div style=\"font-size:10.5px;color:#5c6675;font-family:'JetBrains Mono';margin-top:2px;\">{{ e.when }} · {{ e.actor }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SCHEDULE / HISTORY ============ -->\n      <sc-if value=\"{{ isSchedule }}\">\n      <div style=\"padding:24px 28px;\">\n        <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;\">\n          <h1 style=\"margin:0;font-size:21px;font-weight:700;color:#eef2f7;letter-spacing:-.3px;\">스케줄 · 실행 이력<\u002Fh1>\n          <div onclick=\"{{ navJobs }}\" style=\"padding:8px 15px;border-radius:8px;font-size:12.5px;font-weight:600;color:#fff;cursor:pointer;background:#3b82f6;box-shadow:0 1px 0 #1d4ed8;\">+ 스케줄 추가<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#10141c;border:1px solid #1b212c;border-radius:11px;overflow:hidden;margin-bottom:16px;\">\n          <div style=\"padding:13px 17px;border-bottom:1px solid #1b212c;font-size:13.5px;font-weight:600;color:#e8edf4;\">예약된 체크<\u002Fdiv>\n          <div>\n            <div style=\"display:grid;column-gap:16px;grid-template-columns:1.6fr 1.1fr 1fr 0.9fr 1.1fr 0.7fr;padding:9px 17px;border-bottom:1px solid #1b212c;font-size:10px;text-transform:uppercase;color:#5c6675;font-weight:600;\">\n              <span>작업<\u002Fspan><span>주기<\u002Fspan><span>방법<\u002Fspan><span>보정<\u002Fspan><span>다음 실행<\u002Fspan><span style=\"text-align:right;\">상태<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ schedules }}\" as=\"s\" hint-placeholder-count=\"4\">\n              <div style=\"display:grid;column-gap:16px;grid-template-columns:1.6fr 1.1fr 1fr 0.9fr 1.1fr 0.7fr;align-items:center;padding:11px 17px;border-bottom:1px solid #161b26;\">\n                <span style=\"font-size:12.5px;color:#dbe2ea;font-weight:500;\">{{ s.name }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#9aa4b2;\">{{ s.cron }}<\u002Fspan>\n                <span style=\"font-size:11.5px;color:#9aa4b2;\">{{ s.method }}<\u002Fspan>\n                <span><span style=\"{{ s.policyStyle }}\">{{ s.policy }}<\u002Fspan><\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#9aa4b2;\">{{ s.next }}<\u002Fspan>\n                <span style=\"text-align:right;\"><span style=\"{{ s.toggle }}\"><span style=\"{{ s.knob }}\"><\u002Fspan><\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#10141c;border:1px solid #1b212c;border-radius:11px;overflow:hidden;\">\n          <div style=\"padding:13px 17px;border-bottom:1px solid #1b212c;font-size:13.5px;font-weight:600;color:#e8edf4;\">실행 이력<\u002Fdiv>\n          <div>\n            <div style=\"display:grid;column-gap:16px;grid-template-columns:1.2fr 1fr 1fr 0.8fr 0.8fr 0.8fr;padding:9px 17px;border-bottom:1px solid #1b212c;font-size:10px;text-transform:uppercase;color:#5c6675;font-weight:600;\">\n              <span>실행 시각<\u002Fspan><span>테이블<\u002Fspan><span>방법<\u002Fspan><span style=\"text-align:right;\">불일치<\u002Fspan><span style=\"text-align:right;\">소요<\u002Fspan><span style=\"text-align:right;\">결과<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ history }}\" as=\"h\" hint-placeholder-count=\"8\">\n              <div onclick=\"{{ navResults }}\" style=\"display:grid;column-gap:16px;grid-template-columns:1.2fr 1fr 1fr 0.8fr 0.8fr 0.8fr;align-items:center;padding:9px 17px;border-bottom:1px solid #161b26;cursor:pointer;\">\n                <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#9aa4b2;\">{{ h.when }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#dbe2ea;\">{{ h.tbl }}<\u002Fspan>\n                <span style=\"font-size:11.5px;color:#9aa4b2;\">{{ h.method }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono';font-size:12px;text-align:right;color:{{ h.mismColor }};\">{{ h.mism }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#8a94a3;text-align:right;\">{{ h.dur }}<\u002Fspan>\n                <span style=\"text-align:right;\"><span style=\"{{ h.badge }}\"><span style=\"{{ h.dot }}\"><\u002Fspan>{{ h.statusLabel }}<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ CONNECTIONS ============ -->\n      <sc-if value=\"{{ isConnections }}\">\n      <div style=\"padding:24px 28px;max-width:980px;\">\n        <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;\">\n          <div>\n            <h1 style=\"margin:0;font-size:21px;font-weight:700;color:#eef2f7;letter-spacing:-.3px;\">연결 관리<\u002Fh1>\n            <div style=\"margin-top:5px;font-size:12.5px;color:#8a94a3;font-family:'JetBrains Mono';\">이기종 소스/타겟 연결 · 3개 등록됨<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:8px 15px;border-radius:8px;font-size:12.5px;font-weight:600;color:#fff;cursor:pointer;background:#3b82f6;box-shadow:0 1px 0 #1d4ed8;\">+ 연결 추가<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:14px;\">\n          <sc-for list=\"{{ connections }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div style=\"background:#10141c;border:1px solid #1b212c;border-radius:11px;padding:17px 18px;\">\n              <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:14px;\">\n                <div style=\"{{ c.iconStyle }}\">{{ c.abbr }}<\u002Fdiv>\n                <div style=\"flex:1;\">\n                  <div style=\"font-size:14px;font-weight:600;color:#e8edf4;\">{{ c.name }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#5c6675;font-family:'JetBrains Mono';margin-top:2px;\">{{ c.type }} · {{ c.role }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"{{ c.badge }}\"><span style=\"{{ c.dot }}\"><\u002Fspan>{{ c.statusLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:auto 1fr;gap:7px 14px;font-size:11.5px;\">\n                <span style=\"color:#5c6675;\">호스트<\u002Fspan><span style=\"font-family:'JetBrains Mono';color:#bcc6d2;text-align:right;\">{{ c.host }}<\u002Fspan>\n                <span style=\"color:#5c6675;\">스키마<\u002Fspan><span style=\"font-family:'JetBrains Mono';color:#bcc6d2;text-align:right;\">{{ c.schema }}<\u002Fspan>\n                <span style=\"color:#5c6675;\">버전<\u002Fspan><span style=\"font-family:'JetBrains Mono';color:#bcc6d2;text-align:right;\">{{ c.version }}<\u002Fspan>\n                <span style=\"color:#5c6675;\">응답<\u002Fspan><span style=\"font-family:'JetBrains Mono';color:{{ c.latColor }};text-align:right;\">{{ c.latency }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:8px;margin-top:14px;\">\n                <div style=\"flex:1;text-align:center;padding:7px;border:1px solid #232a37;border-radius:7px;font-size:11.5px;color:#dbe2ea;cursor:pointer;\">연결 테스트<\u002Fdiv>\n                <div style=\"flex:1;text-align:center;padding:7px;border:1px solid #232a37;border-radius:7px;font-size:11.5px;color:#9aa4b2;cursor:pointer;\">설정<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;defaultScreen&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dashboard&quot;,&quot;jobs&quot;,&quot;results&quot;,&quot;approvals&quot;,&quot;schedule&quot;,&quot;connections&quot;],&quot;default&quot;:&quot;dashboard&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;초기 상태&quot;},&quot;defaultPolicy&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;approval&quot;,&quot;auto&quot;],&quot;default&quot;:&quot;approval&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;초기 상태&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: this.props.defaultScreen || 'dashboard',\n    methodSel: 'fullscan',\n    policy: this.props.defaultPolicy || 'approval',\n    hashScope: 'partial',\n    resultTab: 'aggregate',\n    approvalSel: 'COR-7741',\n    decided: {},\n    audit: [],\n    tableSel: { ORDERS: true, PAYMENTS: true, CUSTOMERS: false, INVENTORY: false, SHIPMENTS: false, REFUNDS: false },\n  };\n\n  go(s) { return () => this.setState({ screen: s }); }\n\n  statusMeta(s) {\n    const m = {\n      match: { label: '정합', color: '#34d399', bg: 'rgba(52,211,153,.12)' },\n      mismatch: { label: '불일치', color: '#f87171', bg: 'rgba(248,113,113,.12)' },\n      running: { label: '진행중', color: '#60a5fa', bg: 'rgba(96,165,250,.12)' },\n      queued: { label: '대기', color: '#8a94a3', bg: 'rgba(138,148,163,.12)' },\n      failed: { label: '실패', color: '#f87171', bg: 'rgba(248,113,113,.12)' },\n      pending: { label: '승인대기', color: '#fbbf24', bg: 'rgba(251,191,36,.12)' },\n      approved: { label: '승인됨', color: '#34d399', bg: 'rgba(52,211,153,.12)' },\n      rejected: { label: '반려됨', color: '#f87171', bg: 'rgba(248,113,113,.12)' },\n      connected: { label: '정상', color: '#34d399', bg: 'rgba(52,211,153,.12)' },\n      degraded: { label: '지연', color: '#fbbf24', bg: 'rgba(251,191,36,.12)' },\n    };\n    return m[s] || m.queued;\n  }\n  badge(s) { const x = this.statusMeta(s); return { display: 'inline-flex', alignItems: 'center', gap: '5px', padding: '2px 9px', borderRadius: '5px', fontSize: '11px', fontWeight: 600, color: x.color, background: x.bg, whiteSpace: 'nowrap' }; }\n  dot(s) { const x = this.statusMeta(s); return { width: '6px', height: '6px', borderRadius: '50%', background: x.color, flex: '0 0 auto' }; }\n\n  navStyle(id) {\n    const a = this.state.screen === id;\n    return { display: 'flex', alignItems: 'center', gap: '11px', padding: '9px 16px', margin: '1px 10px', borderRadius: '8px', cursor: 'pointer', fontSize: '13px', fontWeight: a ? 600 : 500, color: a ? '#e8edf4' : '#8a94a3', background: a ? 'rgba(59,130,246,.13)' : 'transparent', boxShadow: a ? 'inset 2px 0 0 #3b82f6' : 'none' };\n  }\n\n  methodCardStyle(id) {\n    const a = this.state.methodSel === id;\n    return { padding: '15px 16px', borderRadius: '10px', cursor: 'pointer', border: a ? '1px solid #3b82f6' : '1px solid #1f2632', background: a ? 'rgba(59,130,246,.06)' : '#0e1219', boxShadow: a ? '0 0 0 3px rgba(59,130,246,.08)' : 'none' };\n  }\n  radioStyle(active) { return { width: '15px', height: '15px', borderRadius: '50%', border: active ? '4px solid #3b82f6' : '2px solid #3a4452', boxSizing: 'border-box', flex: '0 0 auto' }; }\n  policyCardStyle(id) {\n    const a = this.state.policy === id;\n    return { padding: '15px 16px', borderRadius: '10px', cursor: 'pointer', border: a ? '1px solid #3b82f6' : '1px solid #1f2632', background: a ? 'rgba(59,130,246,.06)' : '#0e1219' };\n  }\n  scopeBtn(id) {\n    const a = this.state.hashScope === id;\n    return { flex: '1', textAlign: 'center', padding: '8px', borderRadius: '7px', cursor: 'pointer', fontSize: '12.5px', fontWeight: a ? 600 : 500, color: a ? '#cfe0ff' : '#8a94a3', background: a ? 'rgba(59,130,246,.15)' : '#0f141d', border: a ? '1px solid rgba(59,130,246,.4)' : '1px solid #232a37' };\n  }\n  tabStyle(id) {\n    const a = this.state.resultTab === id;\n    return { padding: '11px 18px', cursor: 'pointer', fontSize: '13px', fontWeight: a ? 600 : 500, color: a ? '#eef2f7' : '#8a94a3', borderBottom: a ? '2px solid #3b82f6' : '2px solid transparent', marginBottom: '-1px' };\n  }\n  opStyle(op) {\n    const c = { UPDATE: '#60a5fa', INSERT: '#34d399', DELETE: '#f87171' }[op] || '#8a94a3';\n    const b = { UPDATE: 'rgba(96,165,250,.13)', INSERT: 'rgba(52,211,153,.13)', DELETE: 'rgba(248,113,113,.13)' }[op] || 'rgba(138,148,163,.12)';\n    return { fontFamily: \"'JetBrains Mono',monospace\", fontSize: '11px', fontWeight: 700, color: c, background: b, borderRadius: '5px', padding: '2px 8px' };\n  }\n  riskColor(r) { return { '높음': '#f87171', '중': '#fbbf24', '낮음': '#34d399' }[r] || '#8a94a3'; }\n\n  toggleTable(name) { return () => this.setState(s => ({ tableSel: { ...s.tableSel, [name]: !s.tableSel[name] } })); }\n  selectApproval(id) { return () => this.setState({ approvalSel: id }); }\n  decide(d) {\n    const id = this.state.approvalSel;\n    const ap = this.AP().find(x => x.id === id);\n    const entry = { when: '방금', actor: '관리자', text: (d === 'approved' ? '승인 → 보정 적용' : '반려') + ' · ' + id + ' (' + ap.table + ' · ' + ap.rows + '행)', kind: d };\n    this.setState(s => ({ decided: { ...s.decided, [id]: d }, audit: [entry, ...s.audit] }));\n  }\n\n  AP() {\n    return [\n      { id: 'COR-7741', table: 'PAYMENTS', op: 'UPDATE', rows: '7,841', col: 'AMOUNT, STATUS', risk: '중', by: '정합성 엔진', method: '통계/집계', when: '12분 전' },\n      { id: 'COR-7738', table: 'ORDERS', op: 'UPDATE', rows: '2,103', col: 'UPDATED_AT', risk: '낮음', by: '정합성 엔진', method: 'Full Scan', when: '34분 전' },\n      { id: 'COR-7733', table: 'REFUNDS', op: 'INSERT', rows: '1,530', col: '(누락 행 삽입)', risk: '높음', by: '정합성 엔진', method: '통계/집계', when: '1시간 전' },\n      { id: 'COR-7720', table: 'SHIPMENTS', op: 'DELETE', rows: '412', col: '(중복 행 제거)', risk: '높음', by: '정합성 엔진', method: 'Full Scan', when: '2시간 전' },\n    ];\n  }\n  DETAIL() {\n    return {\n      'COR-7741': {\n        note: 'Oracle 정본 기준 AMOUNT·STATUS 불일치 7,841행을 Databricks에 갱신',\n        sql: \"MERGE INTO main.sales.payments AS t\\nUSING ora_stage.payments_src AS s\\n  ON t.payment_id = s.payment_id\\nWHEN MATCHED AND (t.amount <> s.amount OR t.status <> s.status) THEN\\n  UPDATE SET t.amount = s.amount,\\n            t.status = s.status,\\n            t._reconciled_at = current_timestamp();\\n-- 영향 행수: 7,841 / DRY-RUN OK\",\n        beforeAfter: [\n          { pk: 'PAY_88421007', field: 'AMOUNT', before: '₩124,800', after: '₩128,400' },\n          { pk: 'PAY_88420993', field: 'STATUS', before: 'PENDING', after: 'SETTLED' },\n          { pk: 'PAY_88420975', field: 'CURRENCY', before: 'NULL', after: 'KRW' },\n        ],\n      },\n      'COR-7738': {\n        note: 'ORDERS.UPDATED_AT 타임스탬프 동기화 2,103행 (저위험)',\n        sql: \"MERGE INTO main.sales.orders AS t\\nUSING ora_stage.orders_src AS s\\n  ON t.order_id = s.order_id\\nWHEN MATCHED AND t.updated_at <> s.updated_at THEN\\n  UPDATE SET t.updated_at = s.updated_at;\\n-- 영향 행수: 2,103 / DRY-RUN OK\",\n        beforeAfter: [\n          { pk: 'ORD_55120044', field: 'UPDATED_AT', before: '2026-06-28 23:10', after: '2026-06-29 01:42' },\n          { pk: 'ORD_55119987', field: 'UPDATED_AT', before: '2026-06-28 22:55', after: '2026-06-29 00:18' },\n        ],\n      },\n      'COR-7733': {\n        note: 'Databricks 누락 행 1,530건 삽입 — 소스에는 있으나 타겟에 없음',\n        sql: \"INSERT INTO main.sales.refunds\\nSELECT s.* FROM ora_stage.refunds_src s\\nLEFT ANTI JOIN main.sales.refunds t\\n  ON s.refund_id = t.refund_id;\\n-- 영향 행수: 1,530 (INSERT) / 위험도 높음 — 승인 필요\",\n        beforeAfter: [\n          { pk: 'RFD_20039', field: '(행)', before: '(없음)', after: 'INSERT' },\n          { pk: 'RFD_20041', field: '(행)', before: '(없음)', after: 'INSERT' },\n        ],\n      },\n      'COR-7720': {\n        note: 'Databricks 중복 행 412건 제거 — 소스 PK 기준 초과분 삭제',\n        sql: \"DELETE FROM main.sales.shipments\\nWHERE shipment_id IN (\\n  SELECT shipment_id FROM (\\n    SELECT shipment_id, row_number() OVER (\\n      PARTITION BY shipment_id ORDER BY _ingested_at) rn\\n    FROM main.sales.shipments) WHERE rn > 1);\\n-- 영향 행수: 412 (DELETE) / 위험도 높음 — 승인 필요\",\n        beforeAfter: [\n          { pk: 'SHP_77810', field: '(중복)', before: '2개 행'
